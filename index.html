<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Math Adventure</title>
    <style>
      :root {
        --bg: #0e0f12;
        --panel: #1b1f26;
        --text: #f2f4f8;
        --accent: #d8b781;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Trebuchet MS", "Verdana", sans-serif;
      }
      .page {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        padding: 12px 16px;
        background: var(--panel);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      header a {
        color: var(--bg);
        background: var(--accent);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 14px;
      }
      .frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Math Adventure</h1>
        <a href="export/game.html">Open Game</a>
      </header>
      <iframe
        class="frame"
        title="Math Adventure"
        src="export/game.html"
        loading="eager"
        allow="fullscreen; autoplay"
      ></iframe>
    </div>
  </body>
</html>
